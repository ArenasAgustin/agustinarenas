  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nd-size: 64px 64px;\n      transition: background 0.4s, color 0.4s;\n    }\n\n    /* ── NAV ── */\n    nav {\n      position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n      display: flex; align-items: center; justify-content: space-between;\n      padding: 20px 48px;\n      border-bottom: 1px solid transparent;\n      transition: border-color 0.3s, background 0.3s, backdrop-filter 0.3s;\n    }\n    nav.scrolled {\n      border-color: var(--border);\n      background: color-mix(in srgb, var(--bg) 80%, transparent);\n      backdrop-filter: blur(16px);\n    }\n    .nav-logo {\n      font-family: var(--mono);\n      font-size: 13px;\n      color: var(--accent);\n      letter-spacing: 0.08em;\n      text-decoration: none;\n    }\n    .nav-links {\n      display: flex; gap: 32px; list-style: none; align-items: center;\n    }\n    .nav-links a {\n      font-family: var(--mono);\n      font-size: 11px;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--fg2);\n      text-decoration: none;\n      transition: color 0.2s;\n    }\n    .nav-links a:hover { color: var(--accent); }\n\n    .theme-toggle {\n      width: 36px; height: 36px;\n      border: 1px solid var(--border2);\n      border-radius: 8px;\n      background: transparent;\n      cursor: pointer;\n      display: flex; align-items: center; justify-content: center;\n      color: var(--fg2);\n      transition: border-color 0.2s, color 0.2s;\n      font-size: 14px;\n    }\n    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }\n\n    /* ── HERO ── */\n    #hero {\n      min-height: 100vh;\n      display: flex;\n      align-items: center;\n      padding: 120px 48px 80px;\n      position: relative;\n      overflow: hidden;\n    }\n    .hero-inner {\n      width: 100%; max-width: 1200px; margin: 0 auto;\n      display: grid;\n      grid-template-columns: 1fr auto;\n      gap: 64px;\n      align-items: center;\n    }\n    .hero-left {}\n    .hero-label {\n      font-family: var(--mono);\n      font-size: 11px;\n      letter-spacing: 0.16em;\n      text-transform: uppercase;\n      color: var(--accent);\n      margin-bottom: 24px;\n      display: flex; align-items: center; gap: 10px;\n    }\n    .hero-label::before {\n      content: '';\n      display: block;\n      width: 24px; height: 1px;\n      background: var(--accent);\n    }\n    h1 {\n      font-size: clamp(52px, 7vw, 96px);\n      font-weight: 700;\n      line-height: 0.95;\n      letter-spacing: -0.03em;\n      margin-bottom: 28px;\n    }\n    h1 span.accent { color: var(--accent); }\n    .hero-subtitle {\n      font-family: var(--mono);\n      font-size: 15px;\n      color: var(--fg2);\n      margin-bottom: 48px;\n      max-width: 480px;\n      line-height: 1.7;\n    }\n    .cursor {\n      display: inline-block;\n      width: 2px; height: 1em;\n      background: var(--accent);\n      margin-left: 2px;\n      vertical-align: text-bottom;\n      animation: blink 1s step-end infinite;\n    }\n    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }\n\n    .hero-ctas {\n      display: flex; gap: 16px; flex-wrap: wrap;\n    }\n    .btn {\n      font-family: var(--mono);\n      font-size: 12px;\n      letter-spacing: 0.1em;\n      text-transform: uppercase;\n      padding: 14px 28px;\n      border-radius: 6px;\n      cursor: pointer;\n      text-decoration: none;\n      transition: all 0.2s;\n      display: inline-flex; align-items: center; gap: 8px;\n    }\n    .btn-primary {\n      background: var(--accent);\n      color: #fff;\n      border: 1px solid var(--accent);\n    }\n    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); transform: translateY(-1px); }\n    .btn-ghost {\n      background: transparent;\n      color: var(--fg);\n      border: 1px solid var(--border2);\n    }\n    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }\n\n    /* Hero right — photo card */\n    .hero-right {\n      position: relative;\n    }\n    .photo-frame {\n      width: 260px; height: 320px;\n      border: 1px solid var(--border2);\n      border-radius: 12px;\n      overflow: hidden;\n      position: relative;\n      background: var(--surface);\n    }\n    .photo-frame img {\n      width: 100%; height: 100%;\n      object-fit: cover;\n      object-position: top center;\n      display: block;\n      filter: grayscale(20%) contrast(1.05);\n      transition: filter 0.4s;\n    }\n    .photo-frame:hover img { filter: grayscale(0%) contrast(1); }\n    .photo-frame::after {\n      content: '';\n      position: absolute; inset: 0;\n      background: linear-gradient(180deg, transparent 60%, color-mix(in srgb, var(--accent) 30%, transparent));\n      pointer-events: none;\n    }\n    .photo-badge {\n      position: absolute;\n      bottom: -16px; left: -16px;\n      background: var(--surface);\n      border: 1px solid var(--border2);\n      border-radius: 8px;\n      padding: 12px 16px;\n      font-family: var(--mono);\n      font-size: 11px;\n      color: var(--fg2);\n    }\n    .photo-badge strong { display: block; color: var(--accent); font-size: 18px; font-weight: 700; margin-bottom: 2px; }\n\n    /* Corner decorations */\n    .corner {\n      position: absolute;\n      width: 20px; height: 20px;\n      border-color: var(--accent);\n      border-style: solid;\n    }\n    .corner-tl { top: -8px; left: -8px; border-width: 1px 0 0 1px; }\n    .corner-br { bottom: -8px; right: -8px; border-width: 0 1px 1px 0; }\n\n    /* ── SECTION WRAPPER ── */\n    .section {\n      max-width: 1200px;\n      margin: 0 auto;\n      padding: 100px 48px;\n    }\n    .section-header {\n      display: flex; align-items: baseline; gap: 16px;\n      margin-bottom: 56px;\n    }\n    .section-num {\n      font-family: var(--mono);\n      font-size: 11px;\n      color: var(--accent);\n      letter-spacing: 0.1em;\n    }\n    .section-title {\n      font-size: clamp(28px, 3.5vw, 48px);\n      font- x; flex-wrap: wrap; gap: 8px; margin-top: 32px;\n    }\n    .tag {\n      font-family: var(--mono);\n      font-size: 11px;\n      padding: 5px 12px;\n      border: 1px solid var(--border2);\n      border-radius: 4px;\n      color: var(--fg2);\n      letter-spacing: 0.06em;\n      transition: border-color 0.2s, color 0.2s;\n    }\n    .tag:hover { border-color: var(--accent); color: var(--accent); }\n\n    /* ── PROJECTS ── */\n    #projects-section {\n      border-top: 1px solid var(--border);\n    }\n    .project-list { display: flex; flex-direction: column; }\n    .project-row {\n      display: grid;\n      grid-template-columns: 56px 1fr auto auto;\n      align-items: center;\n      gap: 24px;\n      padding: 28px 0;\n      border-bottom: 1px solid var(--border);\n      cursor: default;\n      transition: background 0.15s;\n      border-radius: 4px;\n      position: relative;\n    }\n    .project-row:first-child { border-top: 1px solid var(--border); }\n    .project-row::before {\n      content: '';\n      position: absolute;\n      inset: 0;\n      background: var(--surface);\n      opacity: 0;\n      border-radius: 6px;\n      transition: opacity 0.2s;\n      pointer-events: none;\n    }\n    .project-row:hover::before { opacity: 1; }\n    .project-row > * { position: relative; }\n\n    .proj-num {\n      font-family: var(--mono);\n      font-size: 12px;\n      color: var(--accent);\n      letter-spacing: 0.08em;\n      text-align: right;\n    }\n    .proj-info {}\n    .proj-name {\n      font-size: 20px;\n      font-weight: 600;\n      margin-bottom: 4px;\n      letter-spacing: -0.01em;\n    }\n    .proj-desc {\n      font-size: 13px;\n      color: var(--fg2);\n      line-height: 1.5;\n    }\n    .proj-tags {\n      display: flex; gap: 6px; flex-wrap: wrap;\n    }\n    .proj-tag {\n      font-family: var(--mono);\n      font-size: 10px;\n      padding: 3px 8px;\n      border: 1px solid var(--border);\n      border-radius: 3px;\n      color: var(--dim);\n 2Fnav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-inner\">\n    <div class=\"hero-bg-text\" aria-hidden=\"true\">FS<\u002Fdiv>\n    <div class=\"hero-left\">\n      <div class=\"hero-label reveal\">Full-Stack Developer — Buenos Aires, ARG<\u002Fdiv>\n      <h1 class=\"reveal reveal-delay-1\">\n        Agustín<br><span class=\"accent\">Arenas<\u002Fspan>\n      <\u002Fh1>\n      <p class=\"hero-subtitle reveal reveal-delay-2\">\n        Building <strong>scalable<\u002Fstrong> web products from frontend to backend.<br>\n        Performance. Clean code. Real solutions.<span class=\"cursor\"><\u002Fspan>\n      <\u002Fp>\n      <div class=\"hero-ctas reveal reveal-delay-3\">\n        <a class=\"btn btn-primary\" href=\"/curriculum/Curriculum_Agustin_Arenas.pdf\" target=\"_blank\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fline><\u002Fsvg>\n          Download CV\n        <\u002Fa>\n        <a class=\"btn btn-ghost\" href=\"#projects-section\">View projects<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-right reveal reveal-delay-2\">\n      <div style=\"position:relative; display:inline-block;\">\n        <div class=\"photo-frame\">\n          <img src=\"192fe7fa-dc4e-4a39-bbcf-ddebab43365a\" alt=\"Agustín Arenas\" loading=\"lazy\">\n          <div class=\"corner corner-tl\"><\u002Fdiv>\n          <div class=\"corner corner-br\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"photo-badge\">\n          <strong>8+<\u002Fstrong>\n          projects shipped\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<div id=\"about-section\">\n  <div class=\"section\">\n    <div class=\"section-header reveal\">\n      <span class=\"section-num\">[ 01 ]<\u002Fspan>\n      <h2 class=\"section-title\">About<\u002Fh2>\n      <div class=\"section-line\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"about-grid\">\n      <div>\n        <p class=\"about-text reveal\">\n          I'm a <strong>Full-Stack Developer<\u002Fstrong> focused on solving real product problems with\n          clean, scalable web solutions. Based in Argentina, I work across frontend and backend\n          development with a strong focus on <strong>performance, maintainability, and user experience<\u002Fstrong>.\n        <\u002Fp>\n\n      <\u002Fdiv>\n      <div class=\"about-stats reveal reveal-delay-2\">\n        <div class=\"stat-cell\">\n          <div class=\"stat-num\">FS<\u002Fdiv>\n          <div class=\"stat-label\">Full-Stack focus<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-cell\">\n          <div class=\"stat-num\">3+<\u002Fdiv>\n          <div class=\"stat-label\">Years coding<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-cell\">\n          <div class=\"stat-num\">ARG<\u002Fdiv>\n          <div class=\"stat-label\">Based in Córdoba<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-cell\">\n          <div class=\"stat-num\">10+<\u002Fdiv>\n          <div class=\"stat-label\">Technologies<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- EXPERIENCE -->\n<div id=\"experience-section\">\n  <div class=\"section\">\n    <div class=\"section-header reveal\">\n      <span class=\"section-num\">[ 02 ]<\u002Fspan>\n      <h2 class=\"section-title\">Experience<\u002Fh2>\n      <div class=\"section-line\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"experience-list\">\n\n      <div class=\"exp-row reveal\">\n        <div class=\"exp-meta\">\n          <div class=\"exp-period\">Jan 2024 — Present<\u002Fdiv>\n          <div class=\"exp-company\">Dequo<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-content\">\n          <div class=\"exp-role\">Full-Stack Developer<\u002Fdiv>\n          <p class=\"exp-desc\">Continuous improvement of <strong>Tiendaquick<\u002Fstrong>, an e-commerce platform used by businesses to manage online sales. Focus on performance, SEO, UI quality, and code refactoring.<\u002Fp>\n          <div class=\"tags\" style=\"margin-top:16px;\">\n            <span class=\"tag\">JavaScript<\u002Fspan><span class=\"tag\">React<\u002Fspan><span class=\"tag\">PHP<\u002Fspan><span class=\"tag\">Laravel<\u002Fspan><span class=\"tag\">MariaDB<\u002Fspan><span class=\"tag\">Bootstrap<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"exp-row reveal reveal-delay-1\">\n        <div class=\"exp-meta\">\n          <div class=\"exp-period\">Mar 2022 — Jan 2024<\u002Fdiv>\n          <div class=\"exp-company\">Sellers Latam<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-content\">\n          <div class=\"exp-role\">Frontend Developer<\u002Fdiv>\n          <p class=\"exp-desc\">Expanded web properties and improved frontend consistency for commercial brands, including <strong>Sellers Latam<\u002Fstrong> and <strong>Nuvex Uruguay<\u002Fstrong>. Developed Tiendanube integrations.<\u002Fp>\n          <div class=\"tags\" style=\"margin-top:16px;\">\n            <span class=\"tag\">JavaScript<\u002Fspan><span class=\"tag\">React<\u002Fspan><span class=\"tag\">Next.js<\u002Fspan><span class=\"tag\">Sass<\u002Fspan><span class=\"tag\">Bootstrap<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"exp-row reveal reveal-delay-2\">\n        <div class=\"exp-meta\">\n          <div class=\"exp-period\">Feb 2022 — Jul 2022<\u002Fdiv>\n          <div class=\"exp-company\">Last Horde<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"exp-content\">\n          <div class=\"exp-role\">Full-Stack Developer<\u002Fdiv>\n          <p class=\"exp-desc\">Built core e-commerce flows for a <strong>Web3 NFT marketplace<\u002Fstrong> — smart-contract integrations, listing/purchasing flows, API development, and bug fixes.<\u002Fp>\n          <div class=\"tags\" style=\"margin-top:16px;\">\n            <span class=\"tag\">React<\u002Fspan><span class=\"tag\">Web3.js<\u002Fspan><span class=\"tag\">Node.js<\u002Fspan><span class=\"tag\">Express<\u002Fspan><span class=\"tag\">MySQL<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- SKILLS -->\n<div id=\"skills-section\">\n  <div class=\"section\">\n    <div class=\"section-header reveal\">\n      <span class=\"section-num\">[ 03 ]<\u002Fspan>\n      <h2 class=\"section-title\">Skills<\u002Fh2>\n      <div class=\"section-line\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"skills-cloud reveal\">\n      <span class=\"sc-tag sc-xl\">React<\u002Fspan>\n      <span class=\"sc-tag sc-lg\">TypeScript<\u002Fspan>\n      <span class=\"sc-tag sc-md\">Node.js<\u002Fspan>\n      <span class=\"sc-tag sc-xl\">JavaScript<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">Sass<\u002Fspan>\n      <span class=\"sc-tag sc-lg\">Next.js<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">HTML<\u002Fspan>\n      <span class=\"sc-tag sc-md\">PHP<\u002Fspan>\n      <span class=\"sc-tag sc-lg\">Laravel<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">CSS<\u002Fspan>\n      <span class=\"sc-tag sc-md\">PostgreSQL<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">MongoDB<\u002Fspan>\n      <span class=\"sc-tag sc-lg\">Tailwind<\u002Fspan>\n      <span class=\"sc-tag sc-md\">Express<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">MySQL<\u002Fspan>\n      <span class=\"sc-tag sc-md\">Vite<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">Bootstrap<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">Sequelize<\u002Fspan>\n      <span class=\"sc-tag sc-md\">Git<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">Prisma<\u002Fspan>\n      <span class=\"sc-tag sc-sm\">Web3.js<\u002Fspan>\n      <span class ript<\u002Fspan>\n          <span class=\"proj-tag\">React<\u002Fspan>\n          <span class=\"proj-tag\">Node.js<\u002Fspan>\n          <span class=\"proj-tag\">MongoDB<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"proj-links\">\n          <a class=\"proj-link\" href=\"https://github.com/ArenasAgustin/brain-games\" target=\"_blank\">GitHub<\u002Fa>\n          <a class=\"proj-link demo\" href=\"https://brain-games.vercel.app/\" target=\"_blank\">Live ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"project-row reveal reveal-delay-2\" data-preview-id=\"prevWaveMusic\" data-preview-name=\"Wave Music\">\n        <div class=\"proj-num\">03<\u002Fdiv>\n        <div class=\"proj-info\">\n          <div class=\"proj-name\">Wave Music<\u002Fdiv>\n          <div class=\"proj-desc\">Collaborative music platform with agile teamwork, using MongoDB Atlas, Heroku, and Firebase.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proj-tags\">\n          <span class=\"proj-tag\">JavaScript<\u002Fspan>\n          <span class=\"proj-tag\">React<\u002Fspan>\n          <span class=\"proj-tag\">Node.js<\u002Fspan>\n          <span class=\"proj-tag\">MongoDB<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"proj-links\">\n          <a class=\"proj-link\" href=\"https://github.com/ArenasAgustin/Repo-para-PG\" target=\"_blank\">GitHub<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"project-row reveal reveal-delay-3\" data-preview-id=\"prevMorse\" data-preview-name=\"Morse Decoder\">\n        <div class=\"proj-num\">04<\u002Fdiv>\n        <div class=\"proj-info\">\n          <div class=\"proj-name\">Morse Decoder<\u002Fdiv>\n          <div class=\"proj-desc\">Web application that translates and decodes Morse code through a simple, responsive interface.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"proj-tags\">\n          <span class=\"proj-tag\">JavaScript<\u002Fspan>\n          <span class=\"proj-tag\">React<\u002Fspan th=\"2\" style=\"color:var(--dim)\">\n            <line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline>\n          <\u002Fsvg>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FOOTER -->\n<footer>\n  <span class=\"footer-copy\">© 2026 Agustín Arenas<\u002Fspan>\n  <div class=\"footer-links\">\n    <a href=\"https://github.com/ArenasAgustin\" target=\"_blank\">GitHub<\u002Fa>\n    <a href=\"mailto:arenasagustin7@gmail.com\">Email<\u002Fa>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- PROJECT PREVIEW -->\n<div id=\"proj-preview\">\n  <img id=\"proj-preview-img\" src=\"data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7\" alt=\"\">\n  <div class=\"preview-label\" id=\"proj-preview-label\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\">\n  <div class=\"tweaks-title\">// Tweaks<\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <label class=\"tweak-label\">Theme<\u002Flabel>\n    <select class=\"tweak-select\" id=\"tw-theme\">\n      <option value=\"dark\">Dark<\u002Foption>\n      <option value=\"light\">Light<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <label class=\"tweak-label\">Accent color<\u002Flabel>\n    <select class=\"tweak-select\" id=\"tw-accent\">\n      <option value=\"oklch(65% 0.22 285)\">Purple (default)<\u002Foption>\n      <option value=\"oklch(65% 0.22 160)\">Teal<\u002Foption>\n      <option value=\"oklch(65% 0.22 60)\">Amber<\u002Foption>\n      <option value=\"oklch(65% 0.22 30)\">Coral<\u002Foption>\n      <option value=\"oklch(65% 0.22 230)\">Blue<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <label class=\"tweak-label\">Grid background<\u002Flabel>\n    <select class=\"tweak-select\" id=\"tw-grid\">\n      <option value=\"on\">On<\u002Foption>\n      <option value=\"off\">Off<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n\n  <div class=\"tweak-row\">\n    <label class=\"tweak-label\">Variant<\u002Flabel>\n    <select class=\"tweak-select\" id=\"tw-variant\">\n      <option value=\"editorial\">Editorial (current)<\u002Foption>\n      <option value=\"terminal\">Terminal<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ── PROJECT PREVIEWS ──\n  const preview = document.getElementById('proj-preview');\n  const previewImg = document.getElementById('proj-preview-img');\n  const previewLabel = document.getElementById('proj-preview-label');\n\n  // Preload all images into cache\n  document.querySelectorAll('.project-row[data-preview-id]').forEach(row => {\n    const id = row.dataset.previewId;\n    const img = new Image();\n    img.src = (window.__resources && window.__resources[id]) || '';\n  });\n\n  document.addEventListener('mousemove', e => {\n    const pw = 280, ph = 200, pad = 24;\n    const vw = window.innerWidth, vh = window.innerHeight;\n    let left = e.clientX + pad;\n    let top  = e.clientY - ph / 2;\n    if (left + pw > vw - 8) left = e.clientX - pw - pad;\n    if (top < 8) top = 8;\n    if (top + ph > vh - 8) top = vh - ph - 8;\n    preview.style.left = left + 'px';\n    preview.style.top  = top + 'px';\n  });\n\n  window.addEventListener('scroll', () => {\n    preview.classList.remove('visible');\n  }, { passive: true });\n\n  document.querySelectorAll('.project-row[data-preview-id]').forEach(row => {\n    row.addEventListener('mouseenter', () => {\n      const id = row.dataset.previewId;\n      const src = (window.__resources && window.__resources[id]) || '';\n      previewImg.style.opacity = '0';\n      previewImg.src = src;\n      previewLabel.textContent = row.dataset.previewName;\n      preview.classList.add('visible');\n      previewImg.onload = () => { previewImg.style.opacity = '1'; };\n      if (previewImg.complete) previewImg.style.opacity = '1';\n    });\n    row.addEventListener('mouseleave', () => {\n      preview.classList.remove('visible');\n    });\n  });\n\n  // ── TWEAK DEFAULTS ──\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"variant\": \"editorial\",\n    \"theme\": \"dark\"\n  }/*EDITMODE-END*/;\n\n  // ── NAV SCROLL ──\n  const navbar = document.getElementById('navbar');\n  window.addEventListener('scroll', () => {\n    navbar.classList.toggle('scrolled', window.scrollY > 40);\n  });\n\n  // ── THEME ──\n  const html = document.documentElement;\n  let currentTheme = localStorage.getItem('aa-theme') || TWEAK_DEFAULTS.theme || 'dark';\n  applyTheme(currentTheme);\n\n  function applyTheme(t) {\n    currentTheme = t;\n    html.setAttribute('data-theme', t);\n    localStorage.setItem('aa-theme', t);\n    document.getElementById('icon-moon').style.display = t === 'dark' ? 'block' : 'none';\n    document.getElementById('icon-sun').style.display  = t === 'light' ? 'block' : 'none';\n    const tw = document.getElementById('tw-theme');\n    if(tw) tw.value = t;\n  }\n\n  document.getElementById('themeBtn').addEventListener('click', () => {\n    applyTheme(currentTheme === 'dark' ? 'light' : 'dark');\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: currentTheme}}, '*');\n  });\n\n  // ── REVEAL ON SCROLL ──\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });\n  }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\n\n  // ── TWEAKS ──\n  window.addEventListener('message', e => {\n    if(e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');\n    if(e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');\n  });\n  window.parent.postMessage({type:'__edit_mode_available'}, '*');\n\n  document.getElementById('tw-theme').value = currentTheme;\n  document.getElementById('tw-theme').addEventListener('change', e => {\n    applyTheme(e.target.value);\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: e.target.value}}, '*');\n  });\n\n  document.getElementById('tw-accent').addEventListener('change', e => {\n    document.documentElement.style.setProperty('--accent', e.target.value);\n    const l = e.target.value.replace('65%', '55%');\n    document.documentElement.style.setProperty('--accent2', l);\n  });\n\n  document.getElementById('tw-grid').addEventListener('change', e => {\n    document.body.style.backgroundImage = e.target.value === 'off' ? 'none' : '';\n  });\n\n  // Terminal variant: monospace everything\n  document.getElementById('tw-variant').value = TWEAK_DEFAULTS.variant || 'editorial';\n  document.getElementById('tw-variant').addEventListener('change', e => {\n    if(e.target.value === 'terminal') {\n      document.documentElement.style.setProperty('--sans', \"'JetBrains Mono', monospace\");\n    } else {\n      document.documentElement.style.setProperty('--sans', \"'Space Grotesk', sans-serif\");\n    }\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{variant: e.target.value}}, '*');\n  });\n  if((TWEAK_DEFAULTS.variant || 'editorial') === 'terminal') {\n    document.documentElement.style.setProperty('--sans', \"'JetBrains Mono', monospace\");\n  }\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
